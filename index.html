<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bàn Giao Xe - Nhất Lâm</title>
<style>
/* CSS TỐI ƯU CHO GIAO DIỆN DI ĐỘNG */
@import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap');
:root { --primary: #1a56db; --gold: #f59e0b; --success: #059669; --bg: #f1f5f9; --card: #ffffff; --text: #0f172a; --muted: #64748b; --border: #e2e8f0; --radius: 16px; }
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Be Vietnam Pro', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.header { background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%); padding: 14px 16px; display: flex; align-items: center; gap: 10px; position: sticky; top: 0; z-index: 200; box-shadow: 0 4px 20px rgba(0,0,0,.3); }
.header-icon { width: 40px; height: 40px; background: var(--gold); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
.header h1 { font-size: 15px; font-weight: 800; color: #fff; line-height: 1.2; }
.header p  { font-size: 11px; color: rgba(255,255,255,.6); }
.prog-wrap { height: 3px; background: rgba(255,255,255,.1); }
.prog-bar { height: 100%; background: var(--gold); transition: width .4s ease; }
.screen { display: none; padding: 16px 14px 100px; }
.screen.active { display: block; animation: up .3s ease both; }
@keyframes up { from { opacity:0; transform:translateY(15px); } to { opacity:1; transform:none; } }
.card { background: var(--card); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,.04); }
.card-title { font-size: 11px; font-weight: 800; color: var(--primary); text-transform: uppercase; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
.vgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.vcard { border: 2px solid var(--border); border-radius: 12px; padding: 12px 8px; text-align: center; cursor: pointer; transition: all .2s; }
.vcard.sel { border-color: var(--primary); background: #eff6ff; }
.vcard .vi { font-size: 24px; margin-bottom: 4px; }
.vcard .vp { font-size: 15px; font-weight: 800; }
.field { margin-bottom: 12px; }
.field label { display: block; font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 5px; }
.field input, .field select, .field textarea { width: 100%; border: 1.5px solid var(--border); border-radius: 10px; padding: 10px 12px; font-size: 15px; outline: none; }
.field input:focus { border-color: var(--primary); }
.pgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.pslot { aspect-ratio: 4/3; border-radius: 10px; border: 2px dashed var(--border); display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden; background: #f8fafc; font-size: 12px; color: var(--muted); }
.pslot img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
.pchk { position: absolute; top: 5px; right: 5px; width: 20px; height: 20px; background: var(--success); border-radius: 50%; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 10px; }
.btn-wrap { position: fixed; bottom: 0; left: 0; right: 0; padding: 12px 14px; background: #fff; border-top: 1px solid var(--border); display: flex; gap: 8px; z-index: 100; }
.btn { flex: 1; padding: 14px; border-radius: 12px; border: none; font-size: 15px; font-weight: 700; cursor: pointer; }
.btn-p { background: var(--primary); color: #fff; }
.btn-p:disabled { background: var(--border); color: var(--muted); }
.btn-s { background: #f1f5f9; color: var(--text); flex: 0 0 80px; }
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; color: #fff; flex-direction: column; gap: 15px; }
.overlay.show { display: flex; }
.spinner { width: 30px; height: 30px; border: 3px solid #fff; border-top-color: var(--gold); border-radius: 50%; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="overlay" id="overlay">
  <div class="spinner"></div>
  <p>Đang lưu dữ liệu...</p>
</div>

<div class="header">
  <div class="header-icon">🚐</div>
  <div>
    <h1>BÀN GIAO XE NHẤT LÂM</h1>
    <p id="dtNow"></p>
  </div>
</div>
<div class="prog-wrap"><div class="prog-bar" id="prog" style="width:25%"></div></div>

<div class="screen active" id="s0">
  <div class="card">
    <div class="card-title">1. CHỌN XE & TÀI XẾ</div>
    <div class="vgrid" id="vgrid"></div>
    <div class="field" style="margin-top:15px"><label>Tên lái xe *</label><input type="text" id="dName" placeholder="Nhập họ tên"></div>
    <div class="field">
      <label>Bộ phận *</label>
      <select id="dept">
        <option value="">-- Chọn bộ phận --</option>
        <option>Ban Giám Đốc</option><option>Kế toán</option><option>Kinh doanh</option><option>Kỹ thuật</option><option>Dự án</option>
      </select>
    </div>
  </div>
  <div class="btn-wrap"><button class="btn btn-p" id="btn0" onclick="go(1)" disabled>Tiếp theo →</button></div>
</div>

<div class="screen" id="s1">
  <div class="card">
    <div class="card-title">2. HIỆN TRẠNG XE</div>
    <div class="field"><label>Số KM hiện tại *</label><input type="number" id="km" placeholder="Nhập số KM"></div>
    <div class="field"><label>Mức nhiên liệu (0 - Trống, 8 - Đầy)</label>
      <input type="range" id="fuel" min="0" max="8" value="4" oninput="document.getElementById('ft').innerText = 'Mức: ' + this.value + '/8'">
      <div id="ft" style="text-align:center; font-weight:bold">Mức: 4/8</div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">3. HÌNH ẢNH NGOẠI THẤT</div>
    <div class="pgrid">
      <div class="pslot" id="ps_f1" onclick="takePhoto('f1')">📷 Trước Trái</div>
      <div class="pslot" id="ps_f2" onclick="takePhoto('f2')">📷 Trước Phải</div>
      <div class="pslot" id="ps_f3" onclick="takePhoto('f3')">📷 Sau Trái</div>
      <div class="pslot" id="ps_f4" onclick="takePhoto('f4')">📷 Sau Phải</div>
    </div>
  </div>
  <div class="btn-wrap">
    <button class="btn btn-s" onclick="go(0)">Lại</button>
    <button class="btn btn-p" id="btn1" onclick="go(2)" disabled>Tiếp theo →</button>
  </div>
</div>

<div class="screen" id="s2">
  <div class="card">
    <div class="card-title">4. GIẤY TỜ & GHI CHÚ</div>
    <div class="pslot" style="aspect-ratio:2/1" id="ps_doc" onclick="takePhoto('doc')">📷 Chụp ảnh các loại giấy tờ</div>
    <div class="field" style="margin-top:15px"><label>Ghi chú hư hỏng (nếu có)</label><textarea id="note" placeholder="Vết trầy xước, bể đèn..."></textarea></div>
  </div>
  <div class="btn-wrap">
    <button class="btn btn-s" onclick="go(1)">Lại</button>
    <button class="btn btn-p" id="btn2" onclick="submit()" disabled>GỬI BÀN GIAO</button>
  </div>
</div>

<div class="screen" id="s3">
  <div style="text-align:center; padding-top:50px">
    <div style="font-size:60px">✅</div>
    <h2 style="color:var(--success)">HOÀN TẤT</h2>
    <p>Dữ liệu đã được lưu thành công.</p><br>
    <button class="btn btn-p" style="max-width:200px" onclick="location.reload()">Tiếp tục bàn giao</button>
  </div>
</div>

<input type="file" accept="image/*" capture="environment" id="in_f1" onchange="pv('f1',this)" style="display:none">
<input type="file" accept="image/*" capture="environment" id="in_f2" onchange="pv('f2',this)" style="display:none">
<input type="file" accept="image/*" capture="environment" id="in_f3" onchange="pv('f3',this)" style="display:none">
<input type="file" accept="image/*" capture="environment" id="in_f4" onchange="pv('f4',this)" style="display:none">
<input type="file" accept="image/*" capture="environment" id="in_doc" onchange="pv('doc',this)" style="display:none">

<script>
// ĐÃ CẬP NHẬT LINK WEB APP CỦA BẠN
const WEB_URL = 'https://script.google.com/macros/s/AKfycbxXFWC2rVTIz2fq2k1aVmIKNNmtsu4yJvT1pxm4bIW2mHZv8Lt96RFPCoNcwwNHQlAs/exec';

const CARS = [
  { id:'c1', plate:'51L-130.81', name:'VinFast VF5' },
  { id:'c2', plate:'51K-XXXXX', name:'Xe Dự Phòng' }
];

let state = { car:null, photos:{} };

function init() {
  document.getElementById('dtNow').innerText = new Date().toLocaleString('vi-VN');
  document.getElementById('vgrid').innerHTML = CARS.map(c => `
    <div class="vcard" id="vc_${c.id}" onclick="selCar('${c.id}')">
      <div class="vi">🚗</div>
      <div class="vp">${c.plate}</div>
    </div>`).join('');
  
  ['dName','dept'].forEach(i => document.getElementById(i).addEventListener('input', checkS0));
  document.getElementById('km').addEventListener('input', checkS1);
}

function selCar(id) {
  state.car = CARS.find(c => c.id === id);
  document.querySelectorAll('.vcard').forEach(v => v.classList.remove('sel'));
  document.getElementById('vc_'+id).classList.add('sel');
  checkS0();
}

function checkS0() {
  const ok = state.car && document.getElementById('dName').value && document.getElementById('dept').value;
  document.getElementById('btn0').disabled = !ok;
}

function checkS1() {
  const has4 = ['f1','f2','f3','f4'].every(k => state.photos[k]);
  const hasKm = document.getElementById('km').value > 0;
  document.getElementById('btn1').disabled = !(has4 && hasKm);
}

function takePhoto(id) { document.getElementById('in_'+id).click(); }

function pv(id, input) {
  if (input.files && input.files[0]) {
    const reader = new FileReader();
    reader.onload = e => {
      state.photos[id] = e.target.result;
      document.getElementById('ps_'+id).innerHTML = `<img src="${e.target.result}"><div class="pchk">✓</div>`;
      if (id === 'doc') document.getElementById('btn2').disabled = false;
      checkS1();
    };
    reader.readAsDataURL(input.files[0]);
  }
}

function go(n) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('s'+n).classList.add('active');
  document.getElementById('prog').style.width = ((n+1)*25)+'%';
  window.scrollTo(0,0);
}

async function submit() {
  document.getElementById('overlay').classList.add('show');
  const data = {
    recordId: 'BG-' + Date.now(),
    plate: state.car.plate,
    carName: state.car.name,
    driver: document.getElementById('dName').value,
    dept: document.getElementById('dept').value,
    km: document.getElementById('km').value,
    fuel: document.getElementById('fuel').value + '/8',
    note: document.getElementById('note').value,
    images: state.photos
  };

  try {
    const res = await fetch(WEB_URL, {
      method: 'POST',
      body: JSON.stringify(data)
    });
    const result = await res.json();
    if (result.status === 'ok') go(3);
    else alert('Lỗi: ' + result.message);
  } catch (e) {
    alert('Không thể gửi dữ liệu. Hãy kiểm tra kết nối mạng!');
  } finally {
    document.getElementById('overlay').classList.remove('show');
  }
}

init();
</script>
</body>
</html>
