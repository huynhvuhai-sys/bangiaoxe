<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Lịch Trình Lái Xe – Logistics NLC</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#1565C0;--blue-l:#1976D2;--blue-d:#0D47A1;
  --surf:#F0F4FF;--card:#fff;--text:#1A237E;--muted:#5C6BC0;--border:#C5CAE9;
  --green:#2E7D32;--red:#C62828;
  --dong-bg:#E3F2FD;--dong-b:#1E88E5;--dong-t:#0D47A1;
  --mat-bg:#E0F2F1;--mat-b:#00897B;--mat-t:#004D40;
  --kho-bg:#FFF8E1;--kho-b:#F9A825;--kho-t:#E65100;
  --r:14px;--sh:0 4px 20px rgba(21,101,192,.12);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:var(--surf);color:var(--text);min-height:100vh;padding-bottom:60px;}
.hdr{background:linear-gradient(135deg,var(--blue-d),var(--blue-l));padding:12px 16px 14px;text-align:center;box-shadow:0 4px 16px rgba(13,71,161,.3);position:relative;overflow:hidden;}
.hdr::before{content:'';position:absolute;top:-30px;right:-30px;width:110px;height:110px;background:rgba(255,255,255,.08);border-radius:50%;}
.hdr-logo{font-size:11px;color:rgba(255,255,255,.75);font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:3px;}
.hdr h1{font-size:18px;font-weight:900;color:#fff;}
.hdr-sub{font-size:12px;color:rgba(255,255,255,.7);margin-top:3px;}
.wrap{max-width:520px;margin:0 auto;padding:0 12px;}
.sec{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);margin-top:12px;overflow:hidden;}
.sec-head{background:linear-gradient(90deg,var(--blue),var(--blue-l));padding:8px 12px;display:flex;align-items:center;gap:8px;}
.sec-head span.ti{color:#fff;font-weight:800;font-size:13px;}
.sec-body{padding:10px 10px;}
.btn-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;}
.btn-grid.col3{grid-template-columns:repeat(3,1fr);}
.gbtn{padding:9px 4px;border:2px solid var(--border);border-radius:9px;background:var(--surf);font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;color:var(--text);cursor:pointer;text-align:center;transition:all .15s;line-height:1.3;-webkit-tap-highlight-color:transparent;word-break:break-all;}
.gbtn.active{background:var(--blue);border-color:var(--blue);color:#fff;box-shadow:0 3px 12px rgba(21,101,192,.35);}
.gbtn.dong{background:var(--dong-bg);border-color:var(--dong-b);color:var(--dong-t);}
.gbtn.dong.active{background:var(--dong-b);color:#fff;box-shadow:0 3px 12px rgba(30,136,229,.4);}
.gbtn.mat{background:var(--mat-bg);border-color:var(--mat-b);color:var(--mat-t);}
.gbtn.mat.active{background:var(--mat-b);color:#fff;box-shadow:0 3px 12px rgba(0,137,123,.4);}
.gbtn.kho{background:var(--kho-bg);border-color:var(--kho-b);color:var(--kho-t);}
.gbtn.kho.active{background:var(--kho-b);color:#fff;box-shadow:0 3px 12px rgba(249,168,37,.4);}
.trip-card{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);margin-top:10px;overflow:hidden;}
.trip-card-head{background:linear-gradient(90deg,var(--blue-d),var(--blue));padding:8px 12px;display:flex;align-items:center;justify-content:space-between;}
.trip-card-head .tn{color:#fff;font-weight:900;font-size:13px;}
.del-btn{background:rgba(255,255,255,.2);border:none;border-radius:8px;color:#fff;font-size:12px;font-weight:800;padding:5px 12px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.tbl{display:grid;gap:1px;background:var(--border);}
.tbl-row{display:grid;gap:1px;}
.tbl-row.r3{grid-template-columns:1fr 1fr 1fr;}
.tbl-row.r2{grid-template-columns:1fr 1fr;}
.tbl-cell{background:var(--card);padding:8px 9px;}
.tbl-cell label{display:block;font-size:10px;font-weight:800;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.3px;}
.tbl-cell input[type=date],.tbl-cell input[type=number],.tbl-cell textarea{width:100%;border:2px solid var(--border);border-radius:8px;padding:8px;font-size:14px;font-family:'Nunito',sans-serif;font-weight:700;color:var(--text);background:var(--surf);outline:none;-webkit-appearance:none;transition:border-color .2s;}
.tbl-cell input:focus,.tbl-cell textarea:focus{border-color:var(--blue);background:#fff;}
.tbl-cell textarea{resize:none;min-height:54px;line-height:1.4;}
.tbl-cell .btn-grid{margin-top:2px;}
.tbl-cell .gbtn{font-size:11px;padding:7px 3px;}
.btn-add-trip{width:100%;margin-top:12px;padding:11px;background:#fff;border:2px dashed var(--blue);border-radius:var(--r);font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;color:var(--blue);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;-webkit-tap-highlight-color:transparent;transition:background .18s;}
.btn-add-trip:active{background:var(--surf);}
.btn-add-trip:disabled{opacity:.4;cursor:not-allowed;border-color:var(--border);color:var(--muted);}
.trip-counter{text-align:center;margin-top:10px;font-size:13px;font-weight:800;color:var(--muted);}
.trip-counter b{color:var(--blue);font-size:15px;}
.btn-submit{width:100%;padding:14px;background:linear-gradient(135deg,var(--green),#388E3C);color:#fff;border:none;border-radius:var(--r);font-family:'Nunito',sans-serif;font-size:16px;font-weight:900;cursor:pointer;margin-top:14px;box-shadow:0 5px 18px rgba(46,125,50,.35);display:flex;align-items:center;justify-content:center;gap:10px;-webkit-tap-highlight-color:transparent;}
.btn-submit:disabled{opacity:.6;cursor:not-allowed;}
.spinner{width:20px;height:20px;border:3px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none;}
@keyframes spin{to{transform:rotate(360deg);}}
.info-pill{background:#E3F2FD;border:1.5px solid #90CAF9;border-radius:10px;padding:10px 13px;font-size:12px;color:var(--blue);font-weight:700;margin-top:12px;display:flex;align-items:center;gap:7px;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:#1B5E20;color:#fff;padding:13px 22px;border-radius:50px;font-weight:800;font-size:14px;box-shadow:0 8px 28px rgba(0,0,0,.25);transition:transform .35s cubic-bezier(.34,1.56,.64,1);z-index:9999;max-width:92vw;text-align:center;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.err{background:#B71C1C;}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-logo">🚛 Logistics - NLC</div>
  <h1>📋 Lịch Trình Lái Xe</h1>
  <div class="hdr-sub">Nhập 1–30 chuyến · Gửi một lần</div>
</div>
<div class="wrap">
  <div class="sec">
    <div class="sec-head"><span>🧑‍✈️</span><span class="ti">Lái Xe & Số Xe (áp dụng tất cả chuyến)</span></div>
    <div class="sec-body">
      <div style="margin-bottom:12px">
        <label style="font-size:12px;font-weight:700;color:var(--muted);display:block;margin-bottom:4px;">Lái Xe Thực Hiện <span style="color:#E53935">*</span></label>
        <div class="btn-grid" id="grid-laixe"></div>
        <input type="hidden" id="laixe">
      </div>
      <div>
        <label style="font-size:12px;font-weight:700;color:var(--muted);display:block;margin-bottom:4px;">Số Xe <span style="color:#E53935">*</span></label>
        <div class="btn-grid" id="grid-soxe"></div>
        <input type="hidden" id="soxe">
      </div>
    </div>
  </div>
  <div id="tripCards"></div>
  <div class="trip-counter" id="tripCounter"><b>1</b> / 10 chuyến</div>
  <button class="btn-add-trip" id="btnAddTrip" onclick="addTrip()">＋ Thêm Chuyến</button>
  <div class="info-pill">ℹ️ Dữ liệu gửi thẳng vào Google Sheet của Logistics - NLC</div>
  <button class="btn-submit" id="btnSubmit" onclick="submitAll()">
    <div class="spinner" id="spinner"></div>
    <span id="btnText">🚀 GỬI TẤT CẢ CHUYẾN</span>
  </button>
</div>
<div class="toast" id="toast"></div>
<script>
const APPS_SCRIPT_URL='https://script.google.com/macros/s/AKfycbyM7_bYn0Bsv1DS4CzpNeJzBi1MtIJ7WdanW1pKLbo59g0duYNNzDcBc95ItxTXBKnq6A/exec';
const MAX_TRIPS=30;
const DANH_SACH_LAI_XE=[
  // ✏️ SỬA TÊN LÁI XE THẬT TẠI ĐÂY
  'Ngô Hoàn Vũ',
  'Trương Minh Nhật',
  'Tô Minh Điền',
  'Lâm Tấn Ninh',
  'Nguyễn Thanh Tùng',
  'Huỳnh Văn Tâm',
  // Thêm tên mới vào đây...
];
const DANH_SACH_XE=[
  // ✏️ SỬA BIỂN SỐ XE THẬT TẠI ĐÂY
  '29E11431',
  '29H77696',
  '29E12900',
  '29C18487',
  '29E12960',
  '30M84876',
  '30M87069',
  '30M85015',
  // Thêm số xe mới vào đây...
];

var tripCount=0;
function gv(id){var e=document.getElementById(id);return e?e.value.trim():'';}

function buildGrid(gridId,hiddenId,items){
  var g=document.getElementById(gridId);if(!g)return;
  g.innerHTML='';if(items.length<=6)g.classList.add('col3');
  items.forEach(function(item){
    var b=document.createElement('button');b.type='button';b.className='gbtn';b.textContent=item;
    b.addEventListener('click',function(){
      g.querySelectorAll('.gbtn').forEach(function(x){x.classList.remove('active');});
      b.classList.add('active');document.getElementById(hiddenId).value=item;
    });g.appendChild(b);
  });
}

function buildTempGrid(gridId,hiddenId){
  var g=document.getElementById(gridId);if(!g)return;
  g.innerHTML='';g.classList.add('col3');
  [['❄️ Đông','dong','Đông'],['🌤️ Mát','mat','Mát'],['☀️ Khô','kho','Khô']].forEach(function(t){
    var b=document.createElement('button');b.type='button';b.className='gbtn '+t[1];b.textContent=t[0];
    b.addEventListener('click',function(){
      g.querySelectorAll('.gbtn').forEach(function(x){x.classList.remove('active');});
      b.classList.add('active');document.getElementById(hiddenId).value=t[2];
    });g.appendChild(b);
  });
}

function createTripCard(idx){
  var n=idx+1;
  var card=document.createElement('div');card.className='trip-card';card.id='card-'+idx;
  var head=document.createElement('div');head.className='trip-card-head';
  head.innerHTML='<span class="tn">🚚 Chuyến '+n+'</span>'+(idx>0?'<button class="del-btn" id="delbtn-'+idx+'">✕ Xóa</button>':'<span></span>');
  card.appendChild(head);
  var tbl=document.createElement('div');tbl.className='tbl';
  var r1=document.createElement('div');r1.className='tbl-row r3';
  r1.innerHTML='<div class="tbl-cell"><label>📤 Ngày Đi *</label><input type="date" id="ngaydi-'+idx+'"></div>'
    +'<div class="tbl-cell"><label>📥 Ngày Về *</label><input type="date" id="ngayve-'+idx+'"></div>'
    +'<div class="tbl-cell"><label>🗺️ Nơi Giao *</label><textarea id="lichtrinh-'+idx+'" placeholder="Đồng Nai, Bình Dương..."></textarea></div>';
  tbl.appendChild(r1);
  var r2=document.createElement('div');r2.className='tbl-row r3';
  r2.innerHTML='<div class="tbl-cell"><label>📌 Km Đầu *</label><input type="number" id="kmdau-'+idx+'" placeholder="0" min="0"></div>'
    +'<div class="tbl-cell"><label>📍 Km Giao *</label><input type="number" id="kmgiaohang-'+idx+'" placeholder="0" min="0"></div>'
    +'<div class="tbl-cell"><label>🏁 Km Cuối *</label><input type="number" id="kmketthuc-'+idx+'" placeholder="0" min="0"></div>';
  tbl.appendChild(r2);
  var r3=document.createElement('div');r3.className='tbl-row r2';
  r3.innerHTML='<div class="tbl-cell"><label>🌡️ Nhiệt Độ Đi *</label><div class="btn-grid" id="tempdi-'+idx+'"></div><input type="hidden" id="nhietdodi-'+idx+'"></div>'
    +'<div class="tbl-cell"><label>🌡️ Nhiệt Độ Về *</label><div class="btn-grid" id="tempve-'+idx+'"></div><input type="hidden" id="nhietdove-'+idx+'"></div>';
  tbl.appendChild(r3);
  var r4=document.createElement('div');r4.className='tbl-row r2';
  r4.innerHTML='<div class="tbl-cell"><label>🔢 Số Điểm Giao *</label><input type="number" id="sodiemgiao-'+idx+'" placeholder="1" min="1" max="99"></div>'
    +'<div class="tbl-cell"><label>📝 Ghi Chú</label><textarea id="ghichu-'+idx+'" placeholder="Sự cố..."></textarea></div>';
  tbl.appendChild(r4);
  card.appendChild(tbl);
  return card;
}

function addTrip(){
  if(tripCount>=MAX_TRIPS){showToast('⚠️ Tối đa 30 chuyến',true);return;}
  var idx=tripCount;tripCount++;
  var card=createTripCard(idx);
  document.getElementById('tripCards').appendChild(card);
  var db=document.getElementById('delbtn-'+idx);
  if(db){db.addEventListener('click',(function(i){return function(){removeTrip(i);};})(idx));}
  buildTempGrid('tempdi-'+idx,'nhietdodi-'+idx);
  buildTempGrid('tempve-'+idx,'nhietdove-'+idx);
  var n=new Date();
  var d=n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0');
  var di=document.getElementById('ngaydi-'+idx),ve=document.getElementById('ngayve-'+idx);
  if(di)di.value=d;if(ve)ve.value=d;
  updateCounter();
  setTimeout(function(){card.scrollIntoView({behavior:'smooth',block:'start'});},100);
}

function removeTrip(idx){
  var c=document.getElementById('card-'+idx);if(c)c.remove();
  tripCount--;updateCounter();
}

function updateCounter(){
  var el=document.getElementById('tripCounter');
  if(el)el.innerHTML='<b>'+tripCount+'</b> / 30 chuyến';
  var ab=document.getElementById('btnAddTrip');
  if(ab)ab.disabled=(tripCount>=MAX_TRIPS);
}

function validate(){
  if(!gv('laixe')){showToast('⚠️ Vui lòng chọn Lái Xe',true);return false;}
  if(!gv('soxe')){showToast('⚠️ Vui lòng chọn Số Xe',true);return false;}
  if(tripCount===0){showToast('⚠️ Chưa có chuyến nào',true);return false;}
  var cards=document.getElementById('tripCards').querySelectorAll('.trip-card');
  for(var i=0;i<cards.length;i++){
    var x=parseInt(cards[i].id.replace('card-',''));
    var p='Chuyến '+(x+1);
    var checks=[
      [!gv('ngaydi-'+x),'Chọn ngày đi – '+p],
      [!gv('ngayve-'+x),'Chọn ngày về – '+p],
      [!gv('lichtrinh-'+x),'Nhập nơi giao – '+p],
      [!gv('sodiemgiao-'+x),'Nhập số điểm giao – '+p],
      [!gv('kmdau-'+x),'Nhập Km Đầu – '+p],
      [!gv('kmgiaohang-'+x),'Nhập Km Giao Hàng – '+p],
      [!gv('kmketthuc-'+x),'Nhập Km Cuối – '+p],
      [!gv('nhietdodi-'+x),'Chọn Nhiệt Độ Đi – '+p],
      [!gv('nhietdove-'+x),'Chọn Nhiệt Độ Về – '+p],
    ];
    for(var j=0;j<checks.length;j++){
      if(checks[j][0]){showToast('⚠️ '+checks[j][1],true);cards[i].scrollIntoView({behavior:'smooth'});return false;}
    }
  }
  return true;
}

async function submitAll(){
  if(!validate())return;
  var btn=document.getElementById('btnSubmit'),sp=document.getElementById('spinner'),bt=document.getElementById('btnText');
  btn.disabled=true;sp.style.display='block';bt.textContent='Đang gửi...';
  var tg=new Date().toLocaleString('vi-VN');
  var rows=[];
  document.getElementById('tripCards').querySelectorAll('.trip-card').forEach(function(c){
    var x=parseInt(c.id.replace('card-',''));
    rows.push({thoiGianGui:tg,laiXe:gv('laixe'),soXe:gv('soxe'),
      ngayDi:gv('ngaydi-'+x),ngayVe:gv('ngayve-'+x),lichTrinh:gv('lichtrinh-'+x),
      soDiemGiao:gv('sodiemgiao-'+x),kmDau:gv('kmdau-'+x),nhietDoDi:gv('nhietdodi-'+x),
      kmGiaoHang:gv('kmgiaohang-'+x),kmKetThuc:gv('kmketthuc-'+x),nhietDoVe:gv('nhietdove-'+x),
      ghiChu:gv('ghichu-'+x)});
  });
  try{
    await fetch(APPS_SCRIPT_URL,{method:'POST',mode:'no-cors',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'saveRows',rows:rows})});
    showToast('✅ Đã gửi '+rows.length+' chuyến vào Google Sheet!');
    setTimeout(resetAll,2500);
  }catch(e){
    showToast('⚠️ Lỗi kết nối – kiểm tra mạng!',true);
  }finally{
    btn.disabled=false;sp.style.display='none';bt.textContent='🚀 GỬI TẤT CẢ CHUYẾN';
  }
}

function resetAll(){
  document.getElementById('laixe').value='';document.getElementById('soxe').value='';
  document.querySelectorAll('#grid-laixe .gbtn,#grid-soxe .gbtn').forEach(function(b){b.classList.remove('active');});
  document.getElementById('tripCards').innerHTML='';
  tripCount=0;addTrip();
  window.scrollTo({top:0,behavior:'smooth'});
}

function showToast(msg,isErr){
  var t=document.getElementById('toast');t.textContent=msg;
  t.className='toast'+(isErr?' err':'')+' show';
  setTimeout(function(){t.className='toast'+(isErr?' err':'');},4000);
}

buildGrid('grid-laixe','laixe',DANH_SACH_LAI_XE);
buildGrid('grid-soxe','soxe',DANH_SACH_XE);
addTrip();
</script>
</body>
</html>
